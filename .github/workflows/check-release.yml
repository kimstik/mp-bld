name: Check MicroPython Release

on:
  schedule:
    - cron: '0 */6 * * *'  # Every 6 hours
  workflow_dispatch:        # Manual trigger

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.mp.outputs.tag }}
      needs_build: ${{ steps.check.outputs.needs_build }}

    steps:
      - name: Get latest MicroPython release
        id: mp
        run: |
          TAG=$(curl -s https://api.github.com/repos/micropython/micropython/releases/latest | jq -r .tag_name)
          echo "Latest MicroPython release: $TAG"
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Check if already built
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.mp.outputs.tag }}"
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: token $GH_TOKEN" \
            https://api.github.com/repos/${{ github.repository }}/releases/tags/$TAG)

          if [ "$STATUS" = "200" ]; then
            echo "Release $TAG already exists, skipping build"
            echo "needs_build=false" >> $GITHUB_OUTPUT
          else
            echo "Release $TAG not found, triggering build"
            echo "needs_build=true" >> $GITHUB_OUTPUT
          fi

  trigger-build:
    needs: check
    if: needs.check.outputs.needs_build == 'true'
    uses: ./.github/workflows/build.yml
    with:
      mp_version: ${{ needs.check.outputs.tag }}
    secrets: inherit
