name: Check MicroPython Release

on:
  schedule:
    - cron: '0 */6 * * *'  # Every 6 hours
  workflow_dispatch:        # Manual trigger

permissions:
  contents: write
  actions: write

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.mp.outputs.tag }}
      needs_build: ${{ steps.check.outputs.needs_build }}

    steps:
      - name: Keepalive (reset 60-day inactivity timer)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh api -X PUT repos/${{ github.repository }}/actions/workflows/check-release.yml/enable

      - name: Get latest MicroPython release
        id: mp
        run: |
          TAG=$(curl -sf https://api.github.com/repos/micropython/micropython/releases/latest | jq -er .tag_name) || true
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Check if already built
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.mp.outputs.tag }}"
          [ -z "$TAG" ] && { echo "needs_build=false" >> $GITHUB_OUTPUT; exit 0; }
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: token $GH_TOKEN" \
            https://api.github.com/repos/${{ github.repository }}/releases/tags/$TAG)

          if [ "$STATUS" = "404" ]; then
            echo "Release $TAG not found, building"
            echo "needs_build=true" >> $GITHUB_OUTPUT
          else
            echo "Release $TAG exists or check failed ($STATUS), skipping"
            echo "needs_build=false" >> $GITHUB_OUTPUT
          fi

  trigger-build:
    needs: check
    if: needs.check.outputs.needs_build == 'true'
    uses: ./.github/workflows/build.yml
    with:
      mp_version: ${{ needs.check.outputs.tag }}
    secrets: inherit
